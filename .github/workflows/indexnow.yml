name: IndexNow (Bing/Yandex)

# Миттєво повідомляє Bing, Yandex та інші пошуковики, що підтримують IndexNow,
# про нові чи оновлені сторінки — при кожному пуші зі зміною контенту.
# Ключ IndexNow публічний (лежить у корені сайту), секрети не потрібні.

on:
  push:
    branches: [main]
    paths:
      - 'articles/**'
      - 'index.html'
      - 'zrazky/index.html'
      - 'privacy/index.html'
  workflow_dispatch:
  # Після генератора статей (бот-коміт не тригерить push-подію).
  workflow_run:
    workflows: ["Створити статтю (AI)"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: indexnow
  cancel-in-progress: false

jobs:
  ping:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Повідомити IndexNow
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "Ручний запуск або після генератора — надсилаю ВСІ сторінки з sitemap"
            python3 tools/indexnow.py --all
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'articles/*.html' 'index.html' 'zrazky/index.html' 'privacy/index.html' | tr '\n' ' ')
            echo "Змінені сторінки: $CHANGED"
            python3 tools/indexnow.py $CHANGED
          fi
